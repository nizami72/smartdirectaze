<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление витриной</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-3">

<div class="container bg-white p-4 rounded shadow-sm">
    <h4 class="mb-4">📦 Товары магазина</h4>

    <ul class="list-group mb-4">
        <li class="list-group-item d-flex justify-content-between align-items-center"
            th:each="product : ${products}">
            <span th:text="${product.titles != null ? product.titles.get('ru') : ''}">Название товара</span>
            <span class="badge bg-primary rounded-pill" th:text="${product.salePrice} + ' AZN'">Цена</span>
        </li>
        <li class="list-group-item text-muted text-center" th:if="${products.isEmpty()}">
            Товаров пока нет. Добавьте первый!
        </li>
    </ul>

    <form th:action="@{/webhooks/inventory/add}" method="post">
        <input type="hidden" name="token" th:value="${token}">

        <div class="mb-2">
            <input type="text" name="name" class="form-control" placeholder="Название товара (напр. Nike Air Force)" required>
        </div>
        <div class="mb-3">
            <input type="number" step="0.1" name="price" class="form-control" placeholder="Цена (AZN)" required>
        </div>
        <button type="submit" class="btn btn-success w-100">+ Добавить товар</button>
    </form>
</div>

<script>
    // Сообщаем Telegram, что страница загружена
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>
</body>
</html>
