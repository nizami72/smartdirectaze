<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление витриной</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-3">

<div class="container bg-white p-4 rounded shadow-sm">
    <h4 class="mb-4">📦 Товары магазина</h4>

    <ul class="list-group mb-4">
        <li class="list-group-item d-flex justify-content-between align-items-center"
            th:each="product : ${products}">
            <span th:text="${product.titles != null ? product.titles.get('ru') : ''}">Название товара</span>
            <span class="badge bg-primary rounded-pill" th:text="${product.salePrice} + ' AZN'">Цена</span>
        </li>
        <li class="list-group-item text-muted text-center" th:if="${products.isEmpty()}">
            Товаров пока нет. Добавьте первый!
        </li>
    </ul>

    <form th:action="@{/webhooks/inventory/add}" method="post">
        <input type="hidden" name="token" th:value="${token}">

        <div class="row g-2 mb-2">
            <div class="col-md-6">
                <input type="text" name="name" class="form-control" placeholder="Название товара (ru)" required>
            </div>
            <div class="col-md-6">
                <input type="text" name="sku" class="form-control" placeholder="Артикул (SKU)">
            </div>
        </div>

        <div class="row g-2 mb-2">
            <div class="col-md-4">
                <input type="number" step="0.01" name="salePrice" class="form-control" placeholder="Цена продажи (AZN)" required>
            </div>
            <div class="col-md-4">
                <input type="number" step="0.01" name="basePrice" class="form-control" placeholder="Себестоимость">
            </div>
            <div class="col-md-4">
                <input type="text" name="currency" class="form-control" placeholder="Валюта (AZN)" value="AZN">
            </div>
        </div>

        <div class="mb-2">
            <textarea name="description" class="form-control" rows="2" placeholder="Описание (ru)"></textarea>
        </div>

        <div class="row g-2 mb-2">
            <div class="col-md-6">
                <input type="text" name="brandName" class="form-control" placeholder="Бренд">
            </div>
            <div class="col-md-6">
                <input type="text" name="barcode" class="form-control" placeholder="Штрих-код">
            </div>
        </div>

        <div class="row g-2 mb-2">
            <div class="col-md-4">
                <input type="number" name="stockQuantity" class="form-control" placeholder="Кол-во на складе">
            </div>
            <div class="col-md-4">
                <input type="number" step="0.01" name="weight" class="form-control" placeholder="Вес (кг)">
            </div>
            <div class="col-md-4">
                <input type="text" name="size" class="form-control" placeholder="Размер">
            </div>
        </div>

        <div class="row g-2 mb-2">
            <div class="col-md-6">
                <input type="text" name="mainImageUrl" class="form-control" placeholder="URL главного фото">
            </div>
            <div class="col-md-6">
                <input type="text" name="unitOfMeasure" class="form-control" placeholder="Ед. измерения (шт, кг...)">
            </div>
        </div>

        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="isAvailable" id="isAvailable" checked>
            <label class="form-check-label" for="isAvailable">Доступен для продажи</label>
        </div>

        <button type="submit" class="btn btn-success w-100">+ Добавить товар</button>
    </form>
</div>

<script>
    // Сообщаем Telegram, что страница загружена
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>
</body>
</html>
